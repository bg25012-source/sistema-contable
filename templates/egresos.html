<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Egresos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body class="bg-light">

    <div class="container py-5">

        <!-- Encabezado -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h2 class="fw-bold text-danger">
                    Registro de Egresos
                </h2>

                <p class="text-muted mb-0">
                    Administración de egresos del sistema contable
                </p>
            </div>

            <a href="/dashboard"
                class="btn btn-outline-success shadow-sm">

                ← Volver al Dashboard

            </a>

        </div>

        <!-- Formulario -->
        <div class="card shadow border-0 rounded-4">

            <div class="card-body p-4">

                <h5 class="text-danger fw-bold mb-4">
                    Agregar Nuevo Egreso
                </h5>

                <form method="POST">

                    <div class="row g-3">

                        <div class="col-md-3">

                            <label class="form-label fw-semibold">
                                Fecha
                            </label>

                            <input type="date"
                                name="fecha"
                                class="form-control rounded-3"
                                required>

                        </div>

                        <div class="col-md-5">

                            <label class="form-label fw-semibold">
                                Descripción
                            </label>

                            <input type="text"
                                name="descripcion"
                                class="form-control rounded-3"
                                placeholder="Descripción del egreso"
                                required>

                        </div>

                        <div class="col-md-2">

                            <label class="form-label fw-semibold">
                                Monto
                            </label>

                            <input type="number"
                                step="0.01"
                                name="monto"
                                class="form-control rounded-3"
                                placeholder="$0.00"
                                required>

                        </div>

                        <div class="col-md-2 d-flex align-items-end">

                            <button class="btn btn-danger w-100 rounded-3 shadow-sm">

                                Guardar

                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <!-- Tabla -->
        <div class="card shadow border-0 rounded-4 mt-4">

            <div class="card-body">

                <h5 class="text-danger fw-bold mb-3">
                    Historial de Egresos
                </h5>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-danger">

                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>Descripción</th>
                                <th>Monto</th>
                                <th class="text-center">
                                    Acciones
                                </th>
                            </tr>

                        </thead>

                        <tbody>

                            {% for egreso in egresos %}

                            <tr>

                                <td>{{ egreso[0] }}</td>

                                <td>{{ egreso[1] }}</td>

                                <td>{{ egreso[2] }}</td>

                                <td>
                                    <span class="badge bg-danger p-2">
                                        ${{ egreso[3] }}
                                    </span>
                                </td>

                                <td class="text-center">

                                    <a href="#"
                                        onclick="confirmarEliminacion('/eliminar_egreso/{{ egreso[0] }}')"
                                        class="btn btn-danger btn-sm rounded-pill px-3">

                                        Eliminar

                                    </a>

                                </td>

                            </tr>

                            {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function confirmarEliminacion(url) {

            Swal.fire({
                title: '¿Eliminar registro?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#198754',
                cancelButtonColor: '#dc3545',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {

                if (result.isConfirmed) {

                    window.location.href = url;

                }

            });

        }
    </script>

</body>

</html>
