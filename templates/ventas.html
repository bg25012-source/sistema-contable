<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Libro de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="mb-4">
            Libro de Ventas
        </h2>

        <form method="POST">

            <div class="row">

                <div class="col-md-2">
                    <input type="date"
                        name="fecha"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-3">
                    <input type="text"
                        name="cliente"
                        class="form-control"
                        placeholder="Cliente"
                        required>
                </div>

                <div class="col-md-3">
                    <input type="text"
                        name="factura"
                        class="form-control"
                        placeholder="Factura"
                        required>
                </div>

                <div class="col-md-2">
                    <input type="number"
                        step="0.01"
                        name="total"
                        class="form-control"
                        placeholder="Total"
                        required>
                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        Guardar
                    </button>

                </div>

            </div>

        </form>

        <hr>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Factura</th>
                    <th>Total</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>

                {% for venta in ventas %}

                <tr>

                    <td>{{ venta[0] }}</td>
                    <td>{{ venta[1] }}</td>
                    <td>{{ venta[2] }}</td>
                    <td>{{ venta[3] }}</td>
                    <td>${{ venta[4] }}</td>

                    <td>

                        <a href="/eliminar_venta/{{ venta[0] }}"
                            class="btn btn-danger btn-sm">

                            Eliminar

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <a href="/dashboard"
            class="btn btn-secondary">

            Volver

        </a>

    </div>

</body>
</html>
