<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Contable</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row vh-100 justify-content-center align-items-center">

            <div class="col-md-4">

                <div class="card shadow-lg p-4 rounded-4">

                    <div class="text-center">

                        <h2 class="mb-3">
                            Sistema Contable
                        </h2>

                        <p class="text-muted">
                            Super Selectos
                        </p>

                    </div>

                    <form method="POST">

                     <div class="mb-3">

                     <label class="form-label">
                     Correo
                     </label>

                     <input type="email"
                     name="correo"
                     class="form-control"
                     placeholder="Ingrese correo"
                     required>

                     </div>

                     <div class="mb-3">

                     <label class="form-label">
                     Contraseña
                     </label>
 
                     <input type="password"
                     name="password"
                     class="form-control"
                     placeholder="Ingrese contraseña"
                     required>

                     </div>

                     <div class="d-grid">

                     <button class="btn btn-primary">

                     Ingresar

                     </button>

                     </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
