<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Cuentas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="mb-4">
            Catálogo de Cuentas
        </h2>

        <form method="POST">

            <div class="row">

                <div class="col-md-3">

                    <input type="text"
                        name="codigo"
                        class="form-control"
                        placeholder="Código"
                        required>

                </div>

                <div class="col-md-4">

                    <input type="text"
                        name="nombre"
                        class="form-control"
                        placeholder="Nombre cuenta"
                        required>

                </div>

                <div class="col-md-3">

                    <select name="tipo"
                        class="form-control"
                        required>

                        <option value="">
                            Seleccione tipo
                        </option>

                        <option>
                            Activo
                        </option>

                        <option>
                            Pasivo
                        </option>

                        <option>
                            Patrimonio
                        </option>

                        <option>
                            Ingreso
                        </option>

                        <option>
                            Gasto
                        </option>

                    </select>

                </div>

                <div class="col-md-2">

                    <button class="btn btn-success w-100">

                        Guardar

                    </button>

                </div>

            </div>

        </form>

        <hr>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Cuenta</th>
                    <th>Tipo</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>

                {% for cuenta in cuentas %}

                <tr>

                 <td>{{ cuenta[0] }}</td>
                 <td>{{ cuenta[1] }}</td>
                 <td>{{ cuenta[2] }}</td>
                 <td>{{ cuenta[3] }}</td>

                    <td>
                        <a href="/editar_cuenta/{{ cuenta[0] }}"
                         class="btn btn-warning btn-sm">

                         Editar

                        </a>
                        
                        <a href="/eliminar_cuenta/{{ cuenta[0] }}"
                         class="btn btn-danger btn-sm">

                         Eliminar

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <a href="/pdf_catalogo"
            class="btn btn-danger mb-3">

            Descargar PDF

        </a>

        <a href="/dashboard"
            class="btn btn-secondary">

            Volver

        </a>

    </div>

</body>
</html>
