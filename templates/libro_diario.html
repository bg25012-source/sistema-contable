<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Libro Diario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="mb-4">
            Libro Diario
        </h2>

        <form method="POST">

            <div class="row g-2">

                <div class="col-md-2">

                    <input type="date"
                        name="fecha"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-2">

                    <input type="text"
                        name="cuenta"
                        class="form-control"
                        placeholder="Cuenta"
                        required>

                </div>

                <div class="col-md-2">

                    <input type="number"
                        step="0.01"
                        name="debe"
                        class="form-control"
                        placeholder="Debe"
                        required>

                </div>

                <div class="col-md-2">

                    <input type="number"
                        step="0.01"
                        name="haber"
                        class="form-control"
                        placeholder="Haber"
                        required>

                </div>

                <div class="col-md-2">

                    <input type="text"
                        name="descripcion"
                        class="form-control"
                        placeholder="Descripción"
                        required>

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100">
                        Guardar
                    </button>

                </div>

            </div>

        </form>

        <hr>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Cuenta</th>
                    <th>Debe</th>
                    <th>Haber</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>

                {% for diario in diarios %}

                <tr>

                    <td>{{ diario[0] }}</td>
                    <td>{{ diario[1] }}</td>
                    <td>{{ diario[2] }}</td>
                    <td>${{ diario[3] }}</td>
                    <td>${{ diario[4] }}</td>
                    <td>{{ diario[5] }}</td>

                    <td>

                        <a href="/eliminar_diario/{{ diario[0] }}"
                            class="btn btn-danger btn-sm">

                            Eliminar

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <a href="/dashboard"
            class="btn btn-secondary">

            Volver

        </a>

    </div>

</body>
</html>
