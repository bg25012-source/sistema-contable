<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Libro Mayor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="mb-4">
            Libro Mayor
        </h2>

        <form method="POST" class="mb-4">

            <div class="row">

                <div class="col-md-6">

                    <input type="text"
                        name="cuenta"
                        class="form-control"
                        placeholder="Buscar cuenta (Ej: Caja General)"
                        required>

                </div>

                <div class="col-md-3">

                    <button class="btn btn-primary">
                        Buscar
                    </button>

                </div>

            </div>

        </form>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Cuenta</th>
                    <th>Debe</th>
                    <th>Haber</th>
                    <th>Descripción</th>
                </tr>

            </thead>

            <tbody>

                {% for mayor in mayores %}

                <tr>

                    <td>{{ mayor[0] }}</td>
                    <td>{{ mayor[1] }}</td>
                    <td>{{ mayor[2] }}</td>
                    <td>${{ mayor[3] }}</td>
                    <td>${{ mayor[4] }}</td>
                    <td>{{ mayor[5] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <a href="/dashboard"
            class="btn btn-secondary">

            Volver

        </a>

    </div>

</body>
</html>
