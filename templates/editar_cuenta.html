<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Editar Cuenta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="mb-4">
                Editar Cuenta
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>
                        Código
                    </label>

                    <input type="text"
                        name="codigo"
                        class="form-control"
                        value="{{ cuenta[1] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>
                        Nombre Cuenta
                    </label>

                    <input type="text"
                        name="nombre"
                        class="form-control"
                        value="{{ cuenta[2] }}"
                        required>

                </div>

                <div class="mb-3">

                    <label>
                        Tipo
                    </label>

                    <select name="tipo"
                        class="form-control">

                        <option>
                            {{ cuenta[3] }}
                        </option>

                        <option>Activo</option>
                        <option>Pasivo</option>
                        <option>Patrimonio</option>
                        <option>Ingreso</option>
                        <option>Gasto</option>

                    </select>

                </div>

                <button class="btn btn-warning">

                    Actualizar

                </button>

                <a href="/catalogo"
                    class="btn btn-secondary">

                    Volver

                </a>

            </form>

        </div>

    </div>

</body>
</html>
